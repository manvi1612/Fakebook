<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="./assets/media/cartoon-11551057788bw864qbup7.png" type="image/x-icon">
  <title>Fakebook</title>
  <link rel="stylesheet" href="./assets/style/style.css" media="all">
  <script src="./assets/script/app.js" type="module" defer></script>
</head>
<body>
    <header class="header">
        <h1>Fakebook</h1>
        <nav class="menu">
             <a href="#">Friends</a>
             <a href="#">Pages</a>
             <a href="#">Groups</a>
        </nav>
        <div class="profile" id="profilebtn">
             <img src="./assets/media/manvir kaur.jpg" alt="profile">
        </div>
    </header>
    <main>
        <section class="post-form">
            <form id="postForm">
                <textarea id="postText" placeholder="what's new?"></textarea>
                <div class="upload-section">
                    <img src="./assets/media/image-icon.png">
                    <input type="file" id="postImage" accept="image/*">
                    <span id="fileName">No file selected</span>
                    <button id="postbtn" type="submit">Post</button>
                </div>
            </form>
        </section>
        <div id="postsContainer" class="posts"></div>
    </main>

</body>
</html>
